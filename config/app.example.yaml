http:
  addr: 127.0.0.1:8800
  recovery: true
  health:
    liveness:
      enabled: true
      path: live
    readiness:
      enabled: true
      path: ready
    startup:
      enabled: true
      path: startup
  proxy:
    trusted_proxies:
      - 127.0.0.1
      - ::1
    forwarded_headers:
      - X-Forwarded-For
      - X-Real-IP

rpc/grpc:
  addr: 127.0.0.1:9900

rpc/client/tts:
  discovery:
    scheme: example
    service: tts
    group: DEFAULT_GROUP
    metadata:
      version: v1
  timeout: 1s
  metadata:
    scope: front

observe/metrics:
  enabled: true
  namespace: linker_v3_example
  const_labels:
    service: linker-v3-example

observe/tracing:
  mode: memory
  service: linker-v3-example
  environment: local
  sample_ratio: 1

db/postgresql:
  host: 127.0.0.1
  port: 5432
  user: neteast
  db_name: linker_v3_example
  ssl_mode: disable

# token_key 由 APP_EXAMPLE_USER__TOKEN_KEY 或 secret provider 注入。
example/user: {}
