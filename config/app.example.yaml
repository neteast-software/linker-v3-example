http:
  addr: 127.0.0.1:8800
  recovery: true
  health:
    liveness:
      enabled: true
      path: live
    readiness:
      enabled: true
      path: ready
    startup:
      enabled: true
      path: startup

rpc/grpc:
  addr: 127.0.0.1:9900

rpc/client/tts:
  discovery:
    scheme: example
    service: tts
    group: DEFAULT_GROUP
    metadata:
      version: v1
  timeout: 1s
  metadata:
    scope: front

db/postgresql:
  host: 127.0.0.1
  port: 5432
  user: neteast
  db_name: linker_v3_example
  ssl_mode: disable

# token_key 由 APP_EXAMPLE_USER__TOKEN_KEY 或 secret provider 注入。
example/user: {}
