name: check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: linker-v3-example
      - uses: actions/checkout@v4
        with:
          repository: neteast-software/linker
          ref: v3.4.4
          path: linker-v3
          ssh-key: ${{ secrets.LINKER_DEPLOY_KEY }}
      - uses: actions/checkout@v4
        with:
          repository: neteast-software/go-module
          ref: feat/graph-console
          path: modules
          submodules: false
      - name: Checkout required module submodule
        working-directory: modules
        run: git submodule update --init nacos-kit
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.5
          cache-dependency-path: linker-v3-example/go.sum
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
      - working-directory: linker-v3-example
        env:
          QADC_REQUIRED: "false"
          VULN_REQUIRED: "true"
        run: scripts/ci.sh
